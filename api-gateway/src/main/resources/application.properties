spring.application.name=api-gateway
spring.cloud.config.enabled=true
spring.config.import=optional:configserver:http://localhost:8888
server.port=8087

eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

logging.level.org.springframework.cloud.gateway=DEBUG
logging.level.reactor.netty.http.client=DEBUG

spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8080/realms/Delivery_Board_Realm

spring.cloud.gateway.server.webflux.default-filters[0]=DedupeResponseHeader=Access-Control-Allow-Origin RETAIN_FIRST
spring.cloud.gateway.server.webflux.default-filters[1]=DedupeResponseHeader=Access-Control-Allow-Credentials RETAIN_FIRST