server.port=8082

spring.datasource.url=jdbc:h2:mem:evenementdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

management.endpoints.web.exposure.include=health,info,env,refresh
management.endpoint.health.show-details=always

evenement.message=Configuration chargee depuis le Config Server pour EVENEMENT-SERVICE

keycloak.server-url=http://localhost:8080
keycloak.realm=restaurant-realm
keycloak.client-id=evenement-service
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${keycloak.server-url}/realms/${keycloak.realm}/protocol/openid-connect/certs
