server.port=8086
spring.datasource.url=jdbc:mysql://localhost:3306/user_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.client.register-with-eureka=true
management.health.rabbit.enabled=false

spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8080/realms/Delivery_Board_Realm

keycloak.server-url=http://localhost:8080
keycloak.realm=Delivery_Board_Realm
keycloak.client-id=restaurant-client
keycloak.client-secret=

keycloak.admin-realm=master
keycloak.admin-client-id=admin-cli
keycloak.admin-client-secret=
keycloak.admin-username=admin
keycloak.admin-password=admin

