services:
  eureka-server:
    build:
      context: ./eureka-server
    container_name: eureka-server
    ports:
      - "8761:8761"
    networks:
      - restaurant-net

  config-server:
    build:
      context: ./config-server
    container_name: config-server
    depends_on:
      - eureka-server
    environment:
      EUREKA_DEFAULT_ZONE: http://eureka-server:8761/eureka/
    ports:
      - "8888:8888"
    networks:
      - restaurant-net

  mysql:
    image: mysql:8.4
    container_name: mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: user_db
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - restaurant-net

  mongodb:
    image: mongo:7
    container_name: mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - restaurant-net

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - restaurant-net

  user-service:
    build:
      context: ./USER-SERVICE
    container_name: user-service
    depends_on:
      eureka-server:
        condition: service_started
      config-server:
        condition: service_started
      mysql:
        condition: service_healthy
    environment:
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-server:8888
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/user_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: http://host.docker.internal:8080/realms/Delivery_Board_Realm
      KEYCLOAK_SERVER_URL: http://host.docker.internal:8080
      KEYCLOAK_REALM: Delivery_Board_Realm
      KEYCLOAK_CLIENT_ID: restaurant-client
      KEYCLOAK_CLIENT_SECRET:
      KEYCLOAK_ADMIN_REALM: master
      KEYCLOAK_ADMIN_CLIENT_ID: admin-cli
      KEYCLOAK_ADMIN_CLIENT_SECRET:
      KEYCLOAK_ADMIN_USERNAME: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8086:8086"
    networks:
      - restaurant-net

  commande-service:
    build:
      context: ./Commande
    container_name: commande-service
    depends_on:
      eureka-server:
        condition: service_started
      config-server:
        condition: service_started
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_started
    environment:
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-server:8888
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/commande_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
    ports:
      - "8081:8081"
    networks:
      - restaurant-net

  microservice-livraison:
    build:
      context: ./microserviceLivraison
    container_name: microservice-livraison
    depends_on:
      eureka-server:
        condition: service_started
      config-server:
        condition: service_started
      commande-service:
        condition: service_started
    environment:
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-server:8888
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka
      SPRING_DATASOURCE_URL: jdbc:h2:file:/data/Delivery;AUTO_SERVER=TRUE
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD:
    ports:
      - "8060:8060"
    volumes:
      - livraison_data:/data
    networks:
      - restaurant-net

  gestion-plat-service:
    build:
      context: ./gestion-plat-service
    container_name: gestion-plat-service
    depends_on:
      eureka-server:
        condition: service_started
      config-server:
        condition: service_started
      rabbitmq:
        condition: service_started
    environment:
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-server:8888
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka
      SPRING_DATASOURCE_URL: jdbc:h2:file:/data/RestaurantDB;AUTO_SERVER=TRUE
      SPRING_DATASOURCE_USERNAME: sa
      SPRING_DATASOURCE_PASSWORD:
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
    ports:
      - "8085:8085"
    volumes:
      - gestion_plat_data:/data
    networks:
      - restaurant-net

  reviews:
    build:
      context: ./reviews
    container_name: reviews
    depends_on:
      eureka-server:
        condition: service_started
      config-server:
        condition: service_started
      mysql:
        condition: service_healthy
      user-service:
        condition: service_started
      commande-service:
        condition: service_started
    environment:
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-server:8888
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/review_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
    ports:
      - "8084:8084"
    networks:
      - restaurant-net

  evenement-service:
    build:
      context: ./evenement-service
    container_name: evenement-service
    depends_on:
      eureka-server:
        condition: service_started
      config-server:
        condition: service_started
    environment:
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-server:8888
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
    ports:
      - "8082:8082"
    volumes:
      - evenement_data:/data
    networks:
      - restaurant-net

  blog-service:
    build:
      context: ./blog
    container_name: blog-service
    depends_on:
      eureka-server:
        condition: service_started
      mongodb:
        condition: service_started
    environment:
      PORT: 3002
      MONGODB_URI: mongodb://mongodb:27017/blog-service
      EUREKA_HOST: eureka-server
      EUREKA_PORT: 8761
      EUREKA_APP_NAME: blog-service
      SERVICE_HOST: blog-service
      SERVICE_IP: blog-service
    ports:
      - "3002:3002"
    networks:
      - restaurant-net

  api-gateway:
    build:
      context: ./api-gateway
    container_name: api-gateway
    depends_on:
      eureka-server:
        condition: service_started
      config-server:
        condition: service_started
      user-service:
        condition: service_started
      commande-service:
        condition: service_started
      microservice-livraison:
        condition: service_started
      gestion-plat-service:
        condition: service_started
      reviews:
        condition: service_started
      evenement-service:
        condition: service_started
      blog-service:
        condition: service_started
    environment:
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-server:8888
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: http://host.docker.internal:8080/realms/Delivery_Board_Realm
      SERVER_PORT: 8077
    ports:
      - "8077:8077"
    networks:
      - restaurant-net

  frontend:
    build:
      context: ./frontend
    container_name: frontend
    depends_on:
      api-gateway:
        condition: service_started
    ports:
      - "5173:80"
    networks:
      - restaurant-net

networks:
  restaurant-net:
    driver: bridge

volumes:
  mysql_data:
  mongodb_data:
  rabbitmq_data:
  livraison_data:
  gestion_plat_data:
  evenement_data:
