spring.application.name=microserviceLivraison
server.port=8060
# H2
spring.h2.console.enabled=true
spring.h2.console.path=/h2

# Datasource
spring.datasource.username=root
spring.datasource.password=
spring.datasource.url=jdbc:h2:file:./Database/Data/Delivery;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.hibernate.ddl-auto=create
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=true



#eureka registration
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.client.register-with-eureka=true

#Serveur de configuration
spring.config.import=optional:configserver:http://localhost:8888 
welcome.message= Welcome to Delivery MS 

#Actuator
management.endpoints.web.exposure.include=refresh

# Spring RabbitMQ
spring.rabbitmq.host=localhost 
spring.rabbitmq.port=5672 
spring.rabbitmq.username=guest 
spring.rabbitmq.password=guest

# ===== KEYCLOAK / OAUTH2 RESOURCE SERVER =====
# Keycloak 26.x : URL sans /auth
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8080/realms/Delivery_Board_Realm

spring.data.rest.detection-strategy=annotated
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false