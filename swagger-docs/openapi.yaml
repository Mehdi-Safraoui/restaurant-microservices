openapi: 3.0.3
info:
  title: Restaurant Microservices API
  description: |
    Documentation complète de l'API pour la plateforme de gestion de restaurant.
    Tous les endpoints passent par l'API Gateway sur `http://localhost:8077`.
    
    ## Authentification
    La plupart des endpoints nécessitent un token JWT. Utilisez `/api/auth/login` pour obtenir un token.
    Envoyez-le dans le header : `Authorization: Bearer <token>`
    
    ## Routes publiques (sans token)
    - `POST /api/auth/login`
    - `POST /api/auth/register`
  version: 1.0.0
  contact:
    name: Equipe Restaurant Microservices

servers:
  - url: http://localhost:8077
    description: API Gateway (local)

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    User:
      type: object
      properties:
        id:
          type: integer
        email:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        phone:
          type: string
        address:
          type: string

    LoginRequest:
      type: object
      properties:
        email:
          type: string
        password:
          type: string
      required: [email, password]

    Plat:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
        price:
          type: number

    Commande:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: integer
        totalPrice:
          type: number
        status:
          type: string

    Delivery:
      type: object
      properties:
        id:
          type: integer
        commandeId:
          type: integer
        address:
          type: string
        status:
          type: string

    Review:
      type: object
      properties:
        id:
          type: integer
        dishId:
          type: integer
        userId:
          type: integer
        rating:
          type: integer

    Event:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        date:
          type: string
        location:
          type: string

    Blog:
      type: object
      properties:
        _id:
          type: string
        title:
          type: string
        content:
          type: string
        author:
          type: string
        status:
          type: string

security:
  - bearerAuth: []

tags:
  - name: Auth
  - name: Users
  - name: Plats
  - name: Ingredients
  - name: Commandes
  - name: Livraisons
  - name: Reviews
  - name: Complaints
  - name: Events
  - name: Blog

paths:
  /api/auth/register:
    post:
      tags: [Auth]
      summary: Créer un compte utilisateur
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                password:
                  type: string
                firstName:
                  type: string
                lastName:
                  type: string
      responses:
        '201':
          description: Utilisateur créé

  /api/auth/login:
    post:
      tags: [Auth]
      summary: Se connecter
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Connexion réussie

  /api/users:
    get:
      tags: [Users]
      summary: Récupérer tous les utilisateurs
      responses:
        '200':
          description: Liste des utilisateurs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/User'

  /api/users/{id}:
    get:
      tags: [Users]
      summary: Récupérer un utilisateur
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Utilisateur trouvé

    put:
      tags: [Users]
      summary: Mettre à jour un utilisateur
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Utilisateur mis à jour

    delete:
      tags: [Users]
      summary: Supprimer un utilisateur
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: Utilisateur supprimé

  /api/plats:
    get:
      tags: [Plats]
      summary: Récupérer tous les plats
      security: []
      responses:
        '200':
          description: Liste des plats
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Plat'

    post:
      tags: [Plats]
      summary: Créer un plat
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Plat'
      responses:
        '201':
          description: Plat créé

  /api/plats/{id}:
    get:
      tags: [Plats]
      summary: Récupérer un plat
      security: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Plat trouvé

    put:
      tags: [Plats]
      summary: Mettre à jour un plat
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Plat mis à jour

    delete:
      tags: [Plats]
      summary: Supprimer un plat
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: Plat supprimé

  /api/ingredients:
    get:
      tags: [Ingredients]
      summary: Récupérer tous les ingrédients
      security: []
      responses:
        '200':
          description: Liste des ingrédients

    post:
      tags: [Ingredients]
      summary: Créer un ingrédient
      responses:
        '201':
          description: Ingrédient créé

  /api/commandes:
    get:
      tags: [Commandes]
      summary: Récupérer toutes les commandes
      responses:
        '200':
          description: Liste des commandes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Commande'

    post:
      tags: [Commandes]
      summary: Créer une commande
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Commande'
      responses:
        '201':
          description: Commande créée

  /api/commandes/{id}:
    get:
      tags: [Commandes]
      summary: Récupérer une commande
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Commande trouvée

    delete:
      tags: [Commandes]
      summary: Supprimer une commande
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: Commande supprimée

  /api/commandes/{id}/{status}:
    put:
      tags: [Commandes]
      summary: Mettre à jour le statut d'une commande
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: status
          in: path
          required: true
          schema:
            type: string
            enum: [PENDING, CONFIRMED, PREPARING, READY, DELIVERED, CANCELLED]
      responses:
        '200':
          description: Commande mise à jour

  /api/deliveries:
    get:
      tags: [Livraisons]
      summary: Récupérer toutes les livraisons
      responses:
        '200':
          description: Liste des livraisons
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Delivery'

    post:
      tags: [Livraisons]
      summary: Créer une livraison
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Delivery'
      responses:
        '201':
          description: Livraison créée

  /api/deliveries/{id}/assign/{deliveryPersonId}:
    put:
      tags: [Livraisons]
      summary: Assigner un livreur
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: deliveryPersonId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Livreur assigné

  /api/deliveries/{id}/status:
    put:
      tags: [Livraisons]
      summary: Mettre à jour le statut d'une livraison
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Livraison mise à jour

  /api/deliveries/admin/{id}:
    delete:
      tags: [Livraisons]
      summary: Supprimer une livraison (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: Livraison supprimée

  /api/reviews:
    get:
      tags: [Reviews]
      summary: Récupérer tous les avis
      responses:
        '200':
          description: Liste des avis
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Review'

    post:
      tags: [Reviews]
      summary: Créer un avis
      responses:
        '201':
          description: Avis créé

  /api/reviews/dish/{dishId}:
    get:
      tags: [Reviews]
      summary: Récupérer les avis d'un plat
      security: []
      parameters:
        - name: dishId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Avis du plat

  /api/reviews/average/{dishId}:
    get:
      tags: [Reviews]
      summary: Récupérer la note moyenne d'un plat
      security: []
      parameters:
        - name: dishId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Note moyenne

  /api/reviews/approve/{id}:
    put:
      tags: [Reviews]
      summary: Approuver un avis
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Avis approuvé

  /api/complaints:
    get:
      tags: [Complaints]
      summary: Récupérer toutes les réclamations
      responses:
        '200':
          description: Liste des réclamations

    post:
      tags: [Complaints]
      summary: Créer une réclamation
      responses:
        '201':
          description: Réclamation créée

  /api/complaints/user/{userId}:
    get:
      tags: [Complaints]
      summary: Récupérer les réclamations d'un utilisateur
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Réclamations de l'utilisateur

  /api/complaints/resolve/{id}:
    put:
      tags: [Complaints]
      summary: Résoudre une réclamation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Réclamation résolue

  /api/events:
    get:
      tags: [Events]
      summary: Récupérer tous les événements
      security: []
      responses:
        '200':
          description: Liste des événements
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Event'

    post:
      tags: [Events]
      summary: Créer un événement
      responses:
        '201':
          description: Événement créé

  /api/events/{id}:
    get:
      tags: [Events]
      summary: Récupérer un événement
      security: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Événement trouvé

    put:
      tags: [Events]
      summary: Mettre à jour un événement
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Événement mis à jour

    delete:
      tags: [Events]
      summary: Supprimer un événement
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: Événement supprimé

  /api/blogs:
    get:
      tags: [Blog]
      summary: Récupérer les articles (paginés)
      security: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
      responses:
        '200':
          description: Articles paginés

    post:
      tags: [Blog]
      summary: Créer un article
      responses:
        '201':
          description: Article créé

  /api/blogs/simple:
    get:
      tags: [Blog]
      summary: Récupérer tous les articles
      security: []
      responses:
        '200':
          description: Tous les articles
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Blog'

  /api/blogs/{id}:
    get:
      tags: [Blog]
      summary: Récupérer un article
      security: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Article trouvé

    put:
      tags: [Blog]
      summary: Mettre à jour un article
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Article mis à jour

    delete:
      tags: [Blog]
      summary: Supprimer un article
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Article supprimé

  /api/blogs/author/{author}:
    get:
      tags: [Blog]
      summary: Récupérer les articles d'un auteur
      security: []
      parameters:
        - name: author
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Articles de l'auteur

    delete:
      tags: [Blog]
      summary: Supprimer tous les articles d'un auteur
      parameters:
        - name: author
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Articles supprimés

  /api/blogs/tag/{tag}:
    get:
      tags: [Blog]
      summary: Récupérer les articles par tag
      security: []
      parameters:
        - name: tag
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Articles avec le tag

  /api/blogs/search/{term}:
    get:
      tags: [Blog]
      summary: Chercher des articles
      security: []
      parameters:
        - name: term
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Résultats de recherche

  /api/blogs/{id}/publish:
    put:
      tags: [Blog]
      summary: Publier un article
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Article publié

  /api/blogs/{id}/archive:
    put:
      tags: [Blog]
      summary: Archiver un article
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Article archivé
